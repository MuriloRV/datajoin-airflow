# ============================================================================
# DEV-ONLY — docker-compose para iteração local. NÃO é usado em deploy.
#
# Este compose roda o Airflow + seu Postgres dedicado (`airflow-postgres`).
# A rede dj_network e' compartilhada com o datajoin-app: o Airflow continua
# falando com a API (api:8000) e com o Postgres do datajoin-app (`postgres`)
# pra escrever no DW. O `airflow-postgres` deste compose serve APENAS pro
# metadata interno do Airflow — nao tem relacao com o postgres do app.
#
# Pré-requisitos pra subir:
#   1. `cd ../datajoin-app && docker compose up -d postgres api` (rede dj_network + DW + api)
#   2. `cd ../datajoin-airflow && docker compose up -d`
# ============================================================================
services:
  # ─────────── Postgres dedicado pro metadata do Airflow ───────────
  # A imagem oficial cria role+db `airflow` no 1o boot (a partir de
  # POSTGRES_USER + POSTGRES_DB). Sem init.sh — provisionamento e' implicito.
  airflow-postgres:
    image: postgres:16-alpine
    container_name: dj_airflow_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD:-airflow}
      POSTGRES_DB: airflow
    volumes:
      - airflow_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # Sem ports: expostos — debug via `docker compose exec airflow-postgres psql`.

  # ─────────── Airflow 3.x (LocalExecutor, dev) ───────────
  airflow-init:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: dj_airflow_init
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD:-airflow}@airflow-postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      # 1 run por DAG por vez (mesmo comportamento do prod). DAG individual
      # pode setar max_active_runs=N pra subir, mas o default e' 1.
      AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG: "1"
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-ZmRmZGZkc2FmZHNhZmRzYWZkc2FmZHNhZmRzYQ==}
      AIRFLOW__API__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-dev-airflow-secret}
      # Chave JWT da execution API: precisa ser IDÊNTICA em apiserver e scheduler.
      # O scheduler assina um token que o task worker envia ao apiserver.
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET:-dev-airflow-jwt-shared-secret}
      # Airflow 3.x: URL que os task workers usam para falar com a execution API
      # (embutida no api-server). Sem isso, tasks falham com Connection refused.
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-apiserver:8080/execution/
      # API__BASE_URL e' a URL PUBLICA (browser-facing) — usada pra redirects
      # (ex: /api/v2/auth/login -> /auth/login/) e link generation em emails.
      # Em dev: localhost. Em prod: https://airflow.datajoin.cloud (vem do .env).
      # NAO confundir com EXECUTION_API_SERVER_URL acima, que e' interno.
      AIRFLOW__API__BASE_URL: http://localhost:${AIRFLOW_PORT:-8080}
      # Airflow 3.x: FabAuthManager (provider apache-airflow-providers-fab).
      # RBAC com roles built-in (Admin/Op/User/Viewer/Public), UI de Security
      # pra criar users e atribuir roles, permissoes granulares por DAG.
      # Substitui o SimpleAuthManager (1 user hardcoded, sem RBAC).
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      # Credenciais do admin bootstrap (criado pelo init via `airflow users create`).
      # Apos o 1o boot, gerencia tudo via UI; estas vars so importam no provisioning.
      AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME:-admin}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
      AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL:-admin@datajoin.local}
      # Configs preservadas do helmchart antigo pra paridade dev/prod.
      AIRFLOW__CORE__DEFAULT_TIMEZONE: America/Sao_Paulo
      AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE: America/Sao_Paulo
      AIRFLOW__CORE__PARALLELISM: "8"
      AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG: "8"
      AIRFLOW__DATABASE__SQL_ALCHEMY_POOL_SIZE: "5"
      AIRFLOW__DATABASE__SQL_ALCHEMY_MAX_OVERFLOW: "10"
      AIRFLOW__DATABASE__SQL_ALCHEMY_POOL_RECYCLE: "300"
      AIRFLOW__DATABASE__SQL_ALCHEMY_POOL_PRE_PING: "True"
      # Timeout de import de DAG aumentado pro Cosmos parsear dbt projects.
      # Cosmos chama `dbt parse` na 1a vez (cacheado depois) — facil bater 30s.
      AIRFLOW__DAG_PROCESSOR__DAG_FILE_PROCESSOR_TIMEOUT: "120"
      AIRFLOW__CORE__DAGBAG_IMPORT_TIMEOUT: "120"
      # Endpoint da API datajoin (repo datajoin-app). Default assume rede dj_network.
      PLATFORM_API_URL: ${PLATFORM_API_URL:-http://api:8000}
      PLATFORM_API_TOKEN: ${SERVICE_TOKEN:-dev-service-token-change-me}
      # Conexão default ao DW (Postgres do datajoin-app). DAGs usam como fallback
      # quando o tenant não tem Airflow Connection própria configurada.
      DW_DEFAULT_HOST: ${DW_DEFAULT_HOST:-postgres}
      DW_DEFAULT_PORT: "5432"
      DW_DEFAULT_USER: ${DW_DB_USER:-dw_admin}
      DW_DEFAULT_PASSWORD: ${DW_DB_PASSWORD:-dw_admin}
      DW_DEFAULT_DATABASE: ${DW_DB_NAME:-warehouse}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./plugins:/opt/airflow/plugins
      - ./dbt:/opt/dbt
      - airflow_logs:/opt/airflow/logs
    entrypoint: /bin/bash
    # 1) `db migrate` cria schema do core + tabelas FAB (com AUTH_MANAGER=Fab,
    #    o DB manager do FAB e' registrado em external_db_managers e o
    #    `db migrate` chama as migrations dele junto).
    # 2) `users create` retorna erro se ja existe — swallow via `|| echo`
    #    mantem o init idempotente em re-runs.
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --role Admin \
          --username "$$AIRFLOW_ADMIN_USERNAME" \
          --email "$$AIRFLOW_ADMIN_EMAIL" \
          --firstname Admin \
          --lastname User \
          --password "$$AIRFLOW_ADMIN_PASSWORD" \
          || echo "admin user already exists — skipping create"

  airflow-apiserver:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: dj_airflow_api
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    ports:
      - "${AIRFLOW_PORT:-8080}:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./plugins:/opt/airflow/plugins
      - ./dbt:/opt/dbt
      - airflow_logs:/opt/airflow/logs
    # Airflow 3.x: `api-server` substitui `webserver` (UI + REST API unificados).
    command: api-server
    restart: unless-stopped

  airflow-dag-processor:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: dj_airflow_dagproc
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./plugins:/opt/airflow/plugins
      - ./dbt:/opt/dbt
      - airflow_logs:/opt/airflow/logs
    # Airflow 3.x: parsing de DAG saiu do scheduler para um processo dedicado.
    command: dag-processor
    restart: unless-stopped

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: dj_airflow_sched
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./plugins:/opt/airflow/plugins
      - ./dbt:/opt/dbt
      - airflow_logs:/opt/airflow/logs
    command: scheduler
    restart: unless-stopped

  airflow-triggerer:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: dj_airflow_trigger
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./plugins:/opt/airflow/plugins
      - ./dbt:/opt/dbt
      - airflow_logs:/opt/airflow/logs
    # Airflow 3.x: triggerer roda deferrable operators. Sem ele, sensors/operators
    # async ficam parados. Adicionado pra paridade com prod (helmchart antigo
    # tinha triggerer enabled).
    command: triggerer
    restart: unless-stopped

volumes:
  airflow_logs:
  airflow_pg_data:

networks:
  default:
    name: dj_network
    external: true
