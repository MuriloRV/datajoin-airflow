# ============================================================================
# DEV-ONLY — docker-compose para iteração local. NÃO é usado em deploy.
#
# O deploy de produção é via Helm/k3s (ver `deployment/` e
# `.github/workflows/deploy.yml`). O pipeline NUNCA roda `docker compose`,
# só builda a imagem `docker/Dockerfile` e importa no k3s.
#
# Este compose roda APENAS o Airflow. Postgres + Redis + API + Portal
# vivem no repo `datajoin-app` (compose separado). A conexão é via rede
# docker compartilhada `dj_network` — o Postgres deste compose é o do
# datajoin-app, acessado pelo hostname `postgres`.
#
# Pré-requisitos pra subir:
#   1. `cd ../datajoin-app && docker compose up -d postgres` (cria rede + db airflow)
#   2. `cd ../datajoin-airflow && docker compose up -d`
# ============================================================================
services:
  # ─────────── Airflow 3.x (LocalExecutor, dev) ───────────
  airflow-init:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: dj_airflow_init
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD:-airflow}@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      # 1 run por DAG por vez (mesmo comportamento do prod). DAG individual
      # pode setar max_active_runs=N pra subir, mas o default e' 1.
      AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG: "1"
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-ZmRmZGZkc2FmZHNhZmRzYWZkc2FmZHNhZmRzYQ==}
      AIRFLOW__API__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-dev-airflow-secret}
      # Chave JWT da execution API: precisa ser IDÊNTICA em apiserver e scheduler.
      # O scheduler assina um token que o task worker envia ao apiserver.
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET:-dev-airflow-jwt-shared-secret}
      # Airflow 3.x: URL que os task workers usam para falar com a execution API
      # (embutida no api-server). Sem isso, tasks falham com Connection refused.
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-apiserver:8080/execution/
      AIRFLOW__API__BASE_URL: http://airflow-apiserver:8080
      # Airflow 3.x: auth manager (Simple p/ dev local; FAB para produção se quiser UI de users).
      AIRFLOW__CORE__AUTH_MANAGER: airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: "false"
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: admin:admin
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: /opt/airflow/simple_auth_manager_passwords.json.generated
      # Senha do user admin (consumida pelo bash do init/apiserver pra
      # escrever o JSON do SimpleAuthManager). Default 'admin' em dev.
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
      # Configs preservadas do helmchart antigo pra paridade dev/prod.
      AIRFLOW__CORE__DEFAULT_TIMEZONE: America/Sao_Paulo
      AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE: America/Sao_Paulo
      AIRFLOW__CORE__PARALLELISM: "8"
      AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG: "8"
      AIRFLOW__DATABASE__SQL_ALCHEMY_POOL_SIZE: "5"
      AIRFLOW__DATABASE__SQL_ALCHEMY_MAX_OVERFLOW: "10"
      AIRFLOW__DATABASE__SQL_ALCHEMY_POOL_RECYCLE: "300"
      AIRFLOW__DATABASE__SQL_ALCHEMY_POOL_PRE_PING: "True"
      # Timeout de import de DAG aumentado pro Cosmos parsear dbt projects.
      # Cosmos chama `dbt parse` na 1a vez (cacheado depois) — facil bater 30s.
      AIRFLOW__DAG_PROCESSOR__DAG_FILE_PROCESSOR_TIMEOUT: "120"
      AIRFLOW__CORE__DAGBAG_IMPORT_TIMEOUT: "120"
      # Endpoint da API datajoin (repo datajoin-app). Default assume rede dj_network.
      PLATFORM_API_URL: ${PLATFORM_API_URL:-http://api:8000}
      PLATFORM_API_TOKEN: ${SERVICE_TOKEN:-dev-service-token-change-me}
      # Conexão default ao DW (Postgres do datajoin-app). DAGs usam como fallback
      # quando o tenant não tem Airflow Connection própria configurada.
      DW_DEFAULT_HOST: ${DW_DEFAULT_HOST:-postgres}
      DW_DEFAULT_PORT: "5432"
      DW_DEFAULT_USER: ${DW_DB_USER:-dw_admin}
      DW_DEFAULT_PASSWORD: ${DW_DB_PASSWORD:-dw_admin}
      DW_DEFAULT_DATABASE: ${DW_DB_NAME:-warehouse}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./plugins:/opt/airflow/plugins
      - ./dbt:/opt/dbt
      - airflow_logs:/opt/airflow/logs
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        # SimpleAuthManager: AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS define username:role
        # (não password). A senha é gerada aleatoriamente em um JSON. Para ter senha
        # previsível, escrevemos o arquivo manualmente antes do apiserver subir.
        printf '{"admin": "%s"}' "$$AIRFLOW_ADMIN_PASSWORD" > /opt/airflow/simple_auth_manager_passwords.json.generated

  airflow-apiserver:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: dj_airflow_api
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    ports:
      - "${AIRFLOW_PORT:-8080}:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./plugins:/opt/airflow/plugins
      - ./dbt:/opt/dbt
      - airflow_logs:/opt/airflow/logs
    # Airflow 3.x: `api-server` substitui `webserver` (UI + REST API unificados).
    # Escreve senha fixa 'admin' no file de passwords antes de subir (SimpleAuthManager
    # por padrão gera aleatória; isto é só pra dev).
    entrypoint: /bin/bash
    command:
      - -c
      - |
        printf '{"admin": "%s"}' "$$AIRFLOW_ADMIN_PASSWORD" > /opt/airflow/simple_auth_manager_passwords.json.generated
        exec airflow api-server
    restart: unless-stopped

  airflow-dag-processor:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: dj_airflow_dagproc
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./plugins:/opt/airflow/plugins
      - ./dbt:/opt/dbt
      - airflow_logs:/opt/airflow/logs
    # Airflow 3.x: parsing de DAG saiu do scheduler para um processo dedicado.
    command: dag-processor
    restart: unless-stopped

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: dj_airflow_sched
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./plugins:/opt/airflow/plugins
      - ./dbt:/opt/dbt
      - airflow_logs:/opt/airflow/logs
    command: scheduler
    restart: unless-stopped

  airflow-triggerer:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: dj_airflow_trigger
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./plugins:/opt/airflow/plugins
      - ./dbt:/opt/dbt
      - airflow_logs:/opt/airflow/logs
    # Airflow 3.x: triggerer roda deferrable operators. Sem ele, sensors/operators
    # async ficam parados. Adicionado pra paridade com prod (helmchart antigo
    # tinha triggerer enabled).
    command: triggerer
    restart: unless-stopped

volumes:
  airflow_logs:

networks:
  default:
    name: dj_network
    external: true
