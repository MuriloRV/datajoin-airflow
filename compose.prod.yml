# Compose de PRODUÇÃO. Roda em /opt/datajoin/airflow/compose.yml (renomeado
# sem o sufixo .prod ao copiar) na VM Hostinger.
#
# Diferenças vs docker-compose.yml de dev:
# - todos os services usam imagem pre-buildada do ghcr.io (sem build:)
# - sem bind-mount de dags/plugins/dbt (baked na imagem)
# - sem ports: expostos no host (CF tunnel atinge via dj_network)
# - dj_network external (criada antes; cloudflared/datajoin-app conectam nela)
# - vars criticas com :? (compose falha se nao setar)
# - paralelismo, timezone, pool size etc preservados do helmchart antigo
# - resources via deploy.resources.limits

services:
  # ─── one-shot: airflow db migrate + escreve senha do SimpleAuthManager ───
  # Restart "no" + condition: service_completed_successfully nos outros services
  # garante que migrate roda 1x antes de api/scheduler/dag-processor/triggerer subirem.
  airflow-init:
    image: ghcr.io/murilorv/datajoin-airflow/airflow:${IMAGE_TAG:-main}
    container_name: dj_airflow_init
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD:?required}@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DEFAULT_TIMEZONE: America/Sao_Paulo
      AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE: America/Sao_Paulo
      # Limites de paralelismo — VM pequena, evitar oversubscribe do scheduler.
      # Preservado do helmchart antigo (deployment/values/base.yaml).
      AIRFLOW__CORE__PARALLELISM: "8"
      AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG: "8"
      # 1 run por DAG por vez — evita corrida (2 instancias da mesma DAG dbt
      # gravando em target/, ou 2 ETLs do mesmo tenant duplicando watermark).
      AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG: "1"
      # Cosmos chama `dbt parse` no import — primeiro parse pode passar de 30s.
      AIRFLOW__CORE__DAGBAG_IMPORT_TIMEOUT: "120"
      AIRFLOW__DAG_PROCESSOR__DAG_FILE_PROCESSOR_TIMEOUT: "120"
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:?required}
      AIRFLOW__API__SECRET_KEY: ${AIRFLOW_SECRET_KEY:?required}
      # JWT compartilhado entre apiserver e scheduler (Airflow 3.x execution API).
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET:?required}
      # URL que task workers usam pra reportar. Sempre interno.
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-apiserver:8080/execution/
      # URL base p/ link generation (emails, redirects). Em prod, atras do CF tunnel.
      AIRFLOW__API__BASE_URL: ${AIRFLOW_BASE_URL:-http://airflow-apiserver:8080}
      # Auth: SimpleAuthManager (1 user admin). Senha vem do JSON gerado abaixo.
      AIRFLOW__CORE__AUTH_MANAGER: airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: "false"
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: admin:admin
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: /opt/airflow/simple_auth_manager_passwords.json.generated
      # Pool de conexoes ao Postgres metadata. Postgres tem max_connections=100;
      # 4 processos × (5 + 10) = 60 max no pico — folga.
      AIRFLOW__DATABASE__SQL_ALCHEMY_POOL_SIZE: "5"
      AIRFLOW__DATABASE__SQL_ALCHEMY_MAX_OVERFLOW: "10"
      AIRFLOW__DATABASE__SQL_ALCHEMY_POOL_RECYCLE: "300"
      AIRFLOW__DATABASE__SQL_ALCHEMY_POOL_PRE_PING: "True"
      # Integracao com a API datajoin (datajoin-app). Pela rede dj_network.
      PLATFORM_API_URL: ${PLATFORM_API_URL:-http://api:8000}
      PLATFORM_API_TOKEN: ${SERVICE_TOKEN:?required}
      # DW default (Postgres do datajoin-app, mesma VM, dj_network).
      DW_DEFAULT_HOST: ${DW_DEFAULT_HOST:-postgres}
      DW_DEFAULT_PORT: "5432"
      DW_DEFAULT_USER: ${DW_DB_USER:?required}
      DW_DEFAULT_PASSWORD: ${DW_DB_PASSWORD:?required}
      DW_DEFAULT_DATABASE: ${DW_DB_NAME:-warehouse}
      # Senha do admin (consumida pelo bash abaixo pra escrever o JSON).
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:?required}
    volumes:
      - airflow_logs:/opt/airflow/logs
    entrypoint: /bin/bash
    # SimpleAuthManager por padrao gera senha aleatoria. Pra ter senha
    # previsivel, escrevemos o JSON manualmente antes do apiserver subir.
    command:
      - -c
      - |
        airflow db migrate
        printf '{"admin": "%s"}' "$$AIRFLOW_ADMIN_PASSWORD" > /opt/airflow/simple_auth_manager_passwords.json.generated
    restart: "no"

  airflow-apiserver:
    image: ghcr.io/murilorv/datajoin-airflow/airflow:${IMAGE_TAG:-main}
    container_name: dj_airflow_api
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    volumes:
      - airflow_logs:/opt/airflow/logs
    # Reescreve o JSON da senha (em named volume separado o init perderia
    # entre restarts; em /opt/airflow nao volume-monted, so vive no FS local
    # do container). Idempotente.
    entrypoint: /bin/bash
    command:
      - -c
      - |
        printf '{"admin": "%s"}' "$$AIRFLOW_ADMIN_PASSWORD" > /opt/airflow/simple_auth_manager_passwords.json.generated
        exec airflow api-server
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/v2/version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1"

  airflow-scheduler:
    image: ghcr.io/murilorv/datajoin-airflow/airflow:${IMAGE_TAG:-main}
    container_name: dj_airflow_sched
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    volumes:
      - airflow_logs:/opt/airflow/logs
    command: scheduler
    restart: unless-stopped
    # LocalExecutor: tasks rodam aqui dentro. E' o pod mais pesado.
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2"

  airflow-dag-processor:
    image: ghcr.io/murilorv/datajoin-airflow/airflow:${IMAGE_TAG:-main}
    container_name: dj_airflow_dagproc
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    volumes:
      - airflow_logs:/opt/airflow/logs
    # Airflow 3.x: parsing de DAG saiu do scheduler para um processo dedicado.
    command: dag-processor
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1"

  airflow-triggerer:
    image: ghcr.io/murilorv/datajoin-airflow/airflow:${IMAGE_TAG:-main}
    container_name: dj_airflow_trigger
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    volumes:
      - airflow_logs:/opt/airflow/logs
    command: triggerer
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

volumes:
  airflow_logs:

networks:
  default:
    name: dj_network
    external: true
