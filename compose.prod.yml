# Compose de PRODUÇÃO. Roda em /opt/datajoin/airflow/compose.yml (renomeado
# sem o sufixo .prod ao copiar) na VM Hostinger.
#
# Diferenças vs docker-compose.yml de dev:
# - todos os services usam imagem pre-buildada do ghcr.io (sem build:)
# - sem bind-mount de dags/plugins/dbt (baked na imagem)
# - sem ports: expostos no host (CF tunnel atinge via dj_network)
# - dj_network external (criada antes; cloudflared/datajoin-app conectam nela)
# - vars criticas com :? (compose falha se nao setar)
# - paralelismo, timezone, pool size etc preservados do helmchart antigo
# - resources via deploy.resources.limits

services:
  # ─── Postgres dedicado pro metadata do Airflow ───
  # Imagem oficial provisiona role+db `airflow` no 1o boot (POSTGRES_USER +
  # POSTGRES_DB). Sem init.sh. Container interno — sem ports expostos.
  # Backup: pg_dump via `docker compose exec airflow-postgres pg_dump ...`.
  airflow-postgres:
    image: postgres:16-alpine
    container_name: dj_airflow_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD:?required}
      POSTGRES_DB: airflow
    volumes:
      - airflow_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ─── one-shot: airflow db migrate + bootstrap admin user (FAB) ───
  # Restart "no" + condition: service_completed_successfully nos outros services
  # garante que migrate roda 1x antes de api/scheduler/dag-processor/triggerer subirem.
  airflow-init:
    image: ghcr.io/murilorv/datajoin-airflow/airflow:${IMAGE_TAG:-main}
    container_name: dj_airflow_init
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD:?required}@airflow-postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DEFAULT_TIMEZONE: America/Sao_Paulo
      AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE: America/Sao_Paulo
      # Limites de paralelismo — VM pequena, evitar oversubscribe do scheduler.
      # Preservado do helmchart antigo (deployment/values/base.yaml).
      AIRFLOW__CORE__PARALLELISM: "8"
      AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG: "8"
      # 1 run por DAG por vez — evita corrida (2 instancias da mesma DAG dbt
      # gravando em target/, ou 2 ETLs do mesmo tenant duplicando watermark).
      AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG: "1"
      # Cosmos chama `dbt parse` no import — primeiro parse pode passar de 30s.
      AIRFLOW__CORE__DAGBAG_IMPORT_TIMEOUT: "120"
      AIRFLOW__DAG_PROCESSOR__DAG_FILE_PROCESSOR_TIMEOUT: "120"
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:?required}
      AIRFLOW__API__SECRET_KEY: ${AIRFLOW_SECRET_KEY:?required}
      # JWT compartilhado entre apiserver e scheduler (Airflow 3.x execution API).
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET:?required}
      # URL que task workers usam pra reportar. Sempre interno.
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-apiserver:8080/execution/
      # URL PUBLICA (browser-facing) — usada pra redirects do FAB (login,
      # logout) e link generation em emails. PRECISA ser a URL externa
      # (atras do CF tunnel), nao o hostname interno.
      # Default e' a URL de prod (airflow.datajoin.cloud) pra que o deploy
      # funcione zero-config — o secret AIRFLOW_DOTENV nao precisa setar essa
      # var, mas pode sobrescrever caso um dia surja staging/outro dominio.
      # NUNCA voltar pro default antigo `http://airflow-apiserver:8080`
      # (hostname interno) — quebra o redirect de login do FAB no browser.
      AIRFLOW__API__BASE_URL: ${AIRFLOW_BASE_URL:-https://airflow.datajoin.cloud}
      # Auth: FabAuthManager (apache-airflow-providers-fab). RBAC com roles
      # built-in (Admin/Op/User/Viewer/Public) + UI de Security pra gerenciar
      # users. Bootstrap do admin pelo airflow-init via `airflow users create`.
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      # Pool de conexoes ao Postgres metadata. Postgres tem max_connections=100;
      # 4 processos × (5 + 10) = 60 max no pico — folga.
      AIRFLOW__DATABASE__SQL_ALCHEMY_POOL_SIZE: "5"
      AIRFLOW__DATABASE__SQL_ALCHEMY_MAX_OVERFLOW: "10"
      AIRFLOW__DATABASE__SQL_ALCHEMY_POOL_RECYCLE: "300"
      AIRFLOW__DATABASE__SQL_ALCHEMY_POOL_PRE_PING: "True"
      # Integracao com a API datajoin (datajoin-app). Pela rede dj_network.
      PLATFORM_API_URL: ${PLATFORM_API_URL:-http://api:8000}
      PLATFORM_API_TOKEN: ${SERVICE_TOKEN:?required}
      # DW default (Postgres do datajoin-app, mesma VM, dj_network).
      DW_DEFAULT_HOST: ${DW_DEFAULT_HOST:-postgres}
      DW_DEFAULT_PORT: "5432"
      DW_DEFAULT_USER: ${DW_DB_USER:?required}
      DW_DEFAULT_PASSWORD: ${DW_DB_PASSWORD:?required}
      DW_DEFAULT_DATABASE: ${DW_DB_NAME:-warehouse}
      # Credenciais do admin bootstrap (apos 1o boot, gerencia tudo via UI).
      AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME:-admin}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:?required}
      AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL:?required}
    volumes:
      - airflow_logs:/opt/airflow/logs
    entrypoint: /bin/bash
    # 1) `db migrate` cria schema do core + tabelas FAB (com AUTH_MANAGER=Fab,
    #    o DB manager do FAB e' registrado em external_db_managers e o
    #    `db migrate` chama as migrations dele junto).
    # 2) `users create` retorna erro se ja existe — swallow via `|| echo`
    #    deixa o init idempotente em re-runs de deploy.
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --role Admin \
          --username "$$AIRFLOW_ADMIN_USERNAME" \
          --email "$$AIRFLOW_ADMIN_EMAIL" \
          --firstname Admin \
          --lastname User \
          --password "$$AIRFLOW_ADMIN_PASSWORD" \
          || echo "admin user already exists — skipping create"
    restart: "no"

  airflow-apiserver:
    image: ghcr.io/murilorv/datajoin-airflow/airflow:${IMAGE_TAG:-main}
    container_name: dj_airflow_api
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    volumes:
      - airflow_logs:/opt/airflow/logs
    command: api-server
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/v2/version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1"

  airflow-scheduler:
    image: ghcr.io/murilorv/datajoin-airflow/airflow:${IMAGE_TAG:-main}
    container_name: dj_airflow_sched
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    volumes:
      - airflow_logs:/opt/airflow/logs
    command: scheduler
    restart: unless-stopped
    # LocalExecutor: tasks rodam aqui dentro. E' o pod mais pesado.
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2"

  airflow-dag-processor:
    image: ghcr.io/murilorv/datajoin-airflow/airflow:${IMAGE_TAG:-main}
    container_name: dj_airflow_dagproc
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    volumes:
      - airflow_logs:/opt/airflow/logs
    # Airflow 3.x: parsing de DAG saiu do scheduler para um processo dedicado.
    command: dag-processor
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1"

  airflow-triggerer:
    image: ghcr.io/murilorv/datajoin-airflow/airflow:${IMAGE_TAG:-main}
    container_name: dj_airflow_trigger
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    volumes:
      - airflow_logs:/opt/airflow/logs
    command: triggerer
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

volumes:
  airflow_logs:
  airflow_pg_data:

networks:
  default:
    name: dj_network
    external: true
