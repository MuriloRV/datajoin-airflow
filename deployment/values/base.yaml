# Airflow Helm Chart — Base values
# Ref: https://airflow.apache.org/docs/helm-chart/stable/index.html
# Chart: apache-airflow/airflow (>= 1.20, Airflow 3.0+)
#
# Premissas:
#   - VM Hostinger KVM 4 (4 vCPU / 16 GB) com k3s single-node
#   - Postgres metadata roda em Docker NA MESMA VM (compose do datajoin-app)
#     e e' alcancado por um Service+Endpoints `dj-postgres` (sem selector)
#     criado por deployment/scripts/setup-postgres-svc.sh
#   - Logs vao pra hostPath /var/log/datajoin-airflow via PVC airflow-logs-pvc
#     criado por deployment/scripts/setup-logs-volume.sh
#   - Imagem `datajoin-airflow:<tag>` baked com DAGs/plugins/dbt — buildada
#     localmente e importada no containerd do k3s (sem registry remoto)

# -------------------------------------------------------------------
# Imagem custom — sobrescrita pelos values de ambiente
# -------------------------------------------------------------------
images:
  airflow:
    repository: datajoin-airflow
    tag: latest
    pullPolicy: Never  # imagem vive no containerd local do k3s

# -------------------------------------------------------------------
# Executor
# -------------------------------------------------------------------
# LocalExecutor: scheduler executa tasks como subprocessos. Sem Celery/Redis
# (a VM e' pequena, nao justifica complexidade de workers separados).
executor: "LocalExecutor"

# -------------------------------------------------------------------
# Metadata DB — Postgres externo (Docker no host)
# -------------------------------------------------------------------
postgresql:
  enabled: false   # NAO sobe o postgres embutido do chart

data:
  metadataSecretName: airflow-metadata-secret  # criado por deploy.sh

# -------------------------------------------------------------------
# Logs — hostPath via PVC pre-criada (acessivel fora do container)
# -------------------------------------------------------------------
logs:
  persistence:
    enabled: true
    existingClaim: airflow-logs-pvc

# -------------------------------------------------------------------
# DAGs — baked na imagem (sem git-sync, sem PVC)
# -------------------------------------------------------------------
dags:
  persistence:
    enabled: false
  gitSync:
    enabled: false

# -------------------------------------------------------------------
# Componentes — recursos dimensionados pra ~10 GB total
# -------------------------------------------------------------------
# Soma de limits (worst case): api 768Mi + scheduler 4Gi + dag-proc 1Gi
# + triggerer 512Mi = ~6.3 GB. Mais ~1.5 GB de overhead k3s/sistema.
# Sobra ~6 GB pro datajoin-app (portal + api + postgres em Docker).

apiServer:
  replicas: 1
  resources:
    requests: { cpu: 250m,  memory: 384Mi }
    limits:   { cpu: 1000m, memory: 768Mi }
  service:
    type: NodePort
    ports:
      - name: api-server
        port: 8080
        nodePort: 30080
  # Probes tolerantes — Postgres no Docker pode hiccupar em rebuild do
  # datajoin-app (livenessProbe nao pode matar o pod por isso).
  livenessProbe:
    initialDelaySeconds: 30
    timeoutSeconds: 30
    periodSeconds: 30
    failureThreshold: 20
  startupProbe:
    timeoutSeconds: 30
    periodSeconds: 10
    failureThreshold: 60
  readinessProbe:
    timeoutSeconds: 30
    periodSeconds: 15
    failureThreshold: 20

scheduler:
  replicas: 1
  # LocalExecutor: tasks rodam aqui dentro. E' o pod mais pesado.
  resources:
    requests: { cpu: 1000m, memory: 2Gi }
    limits:   { cpu: 2000m, memory: 4Gi }

triggerer:
  enabled: true
  replicas: 1
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }

dagProcessor:
  enabled: true
  replicas: 1
  # Cosmos chama `dbt parse` no import — primeiro parse pode passar de 30s.
  # Por isso o DAG_FILE_PROCESSOR_TIMEOUT em config.dag_processor abaixo.
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits:   { cpu: 1000m, memory: 1Gi }

workers:
  replicas: 0  # LocalExecutor nao usa workers separados

# -------------------------------------------------------------------
# Migrations — Helm hook do chart
# -------------------------------------------------------------------
migrateDatabaseJob:
  enabled: true

# -------------------------------------------------------------------
# Componentes desligados (nao precisamos)
# -------------------------------------------------------------------
flower:    { enabled: false }
redis:     { enabled: false }
statsd:    { enabled: false }
pgbouncer: { enabled: false }

# -------------------------------------------------------------------
# ENV — secrets/integracao com datajoin-app
# -------------------------------------------------------------------
# `env:` no chart aplica em todos os componentes (api, scheduler, triggerer,
# dag-processor, migrate-job). Os valores sensiveis vem do secret
# `datajoin-airflow-env` (criado por deploy.sh a partir do .env.prod).
env:
  - name: AIRFLOW__CORE__FERNET_KEY
    valueFrom: { secretKeyRef: { name: datajoin-airflow-env, key: AIRFLOW_FERNET_KEY } }
  - name: AIRFLOW__API__SECRET_KEY
    valueFrom: { secretKeyRef: { name: datajoin-airflow-env, key: AIRFLOW_SECRET_KEY } }
  # JWT compartilhado entre api-server e scheduler (Airflow 3.x execution API)
  - name: AIRFLOW__API_AUTH__JWT_SECRET
    valueFrom: { secretKeyRef: { name: datajoin-airflow-env, key: AIRFLOW_JWT_SECRET } }
  # Integracao com a API datajoin (datajoin-app)
  - name: PLATFORM_API_URL
    valueFrom: { secretKeyRef: { name: datajoin-airflow-env, key: PLATFORM_API_URL } }
  - name: PLATFORM_API_TOKEN
    valueFrom: { secretKeyRef: { name: datajoin-airflow-env, key: SERVICE_TOKEN } }
  # DW default (Postgres do Docker, mesmo host)
  - name: DW_DEFAULT_HOST
    valueFrom: { secretKeyRef: { name: datajoin-airflow-env, key: DW_DEFAULT_HOST } }
  - name: DW_DEFAULT_PORT
    valueFrom: { secretKeyRef: { name: datajoin-airflow-env, key: DW_DEFAULT_PORT } }
  - name: DW_DEFAULT_USER
    valueFrom: { secretKeyRef: { name: datajoin-airflow-env, key: DW_DB_USER } }
  - name: DW_DEFAULT_PASSWORD
    valueFrom: { secretKeyRef: { name: datajoin-airflow-env, key: DW_DB_PASSWORD } }
  - name: DW_DEFAULT_DATABASE
    valueFrom: { secretKeyRef: { name: datajoin-airflow-env, key: DW_DB_NAME } }

# -------------------------------------------------------------------
# Configuracoes do Airflow (airflow.cfg via env)
# -------------------------------------------------------------------
config:
  core:
    load_examples: "False"
    default_timezone: "America/Sao_Paulo"
    # Limites de paralelismo — VM pequena, evitar oversubscribe do scheduler
    parallelism: "8"
    max_active_tasks_per_dag: "8"
    # 1 run por DAG por vez — evita corrida (ex: 2 instancias da mesma DAG
    # dbt gravando em `target/`, ou 2 ETLs do mesmo tenant lendo a mesma
    # watermark e duplicando dados). Override por DAG so se REALMENTE precisar.
    max_active_runs_per_dag: "1"
    dagbag_import_timeout: "120"
    auth_manager: "airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager"
    # SimpleAuthManager: dev/staging-friendly. Em prod hardened, trocar por FAB.
    simple_auth_manager_all_admins: "False"
    simple_auth_manager_users: "admin:admin"
    simple_auth_manager_passwords_file: "/opt/airflow/simple_auth_manager_passwords.json.generated"
  webserver:
    default_ui_timezone: "America/Sao_Paulo"
  dag_processor:
    # Cosmos: primeiro parse de cada projeto dbt pode passar de 30s
    dag_file_processor_timeout: "120"
  database:
    # Postgres tem default max_connections=100. 4 processos × pool 5 + overflow 10
    # = 60 conexoes max no pico, 60% do limite — folga.
    sql_alchemy_pool_size: "5"
    sql_alchemy_max_overflow: "10"
    sql_alchemy_pool_recycle: "300"
    sql_alchemy_pool_pre_ping: "True"
